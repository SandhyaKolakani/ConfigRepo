# ==============================
# Eureka Client
# ==============================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ==============================
# Circuit Breaker (Resilience4J)
# ==============================
resilience4j.circuitbreaker.instances.myBraker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.myBraker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.myBraker.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.myBraker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.myBraker.permittedNumberOfCallsInHalfOpenState=5

# ==============================
# Actuator / Admin
# ==============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

spring.boot.admin.client.url=http://localhost:8001
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123
spring.boot.admin.client.instance.metadata.user.name=admin
spring.boot.admin.client.instance.metadata.user.password=admin123
spring.boot.admin.client.auto-registration=true
spring.boot.admin.client.auto-deregistration=true

# ==============================
# Zipkin / Tracing
# ==============================
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

# ==============================
# H2 Database Configuration
# ==============================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sandhya
spring.datasource.password=sandhya@123
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
