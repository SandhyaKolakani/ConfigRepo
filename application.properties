#Eureka details 
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#eureka.client.service-url.defaultZone=http://host.docker.internal:8761/eureka

eureka.instance.prefer-ip-address=true
#eureka.instance.hostname=host.docker.internal
eureka.instance.non-secure-port=2000
eureka.instance.hostname=localhost
eureka.instance.instance-id=${spring.application.name}:${server.port}

#Circuit Braker Properties
resilience4j.circuitbreaker.instances.myBraker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.myBraker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.myBraker.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.myBraker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.myBraker.permittedNumberOfCallsInHalfOpenState=5

#Add the Actuator endpoints 
management.endpoints.web.exposure.include =* 


# Show health details
management.endpoint.health.show-details = always
management.endpoint.health.probes.enabled=true

# Register with Admin Server
spring.boot.admin.client.url=http://localhost:8001
#spring.boot.admin.client.url=http://host.docker.internal:8001

# Admin credentials (if admin server uses basic auth)
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123

# IMPORTANT (fixes 401)
spring.boot.admin.client.instance.metadata.user.name=sandhya
spring.boot.admin.client.instance.metadata.user.password=kolakani@123

spring.boot.admin.client.auto-registration=true
spring.boot.admin.client.auto-deregistration=true

spring.boot.admin.client.instance.service-base-url=http://localhost:2000


# Zipkin server 
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

